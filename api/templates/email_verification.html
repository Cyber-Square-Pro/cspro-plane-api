{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        /*  styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .logo {
            display: block;
            margin: 0 auto;
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        }
        .code-container {
            background-color: #007bff;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!--logo -->
        <img src="https://th.bing.com/th/id/OIP.y7It5uZvqs0iL8v-OUwNrAHaHa?rs=1&pid=ImgDetMain" alt="Logo" class="logo">
        
        <p style="text-align: center; font-size: 18px;">
            Click the link below to reset your password:
        </p>
        <div style="text-align: center; margin: 20px 0;">
            <a href="{{ reset_link }}" style="background: #007bff; color: #fff; padding: 12px 24px; border-radius: 5px; text-decoration: none; font-size: 18px;">
                Reset Password
            </a>
        </div>
        <p style="text-align: center;">If you did not request a password reset, you can ignore this email.</p>
    </div>
<div>
    <p class="recipient-info">Cyber Square Reset Password Email. Please delete if you aren't the intended recipient.</p>
        
</div>
</div>
</body>
</html>
