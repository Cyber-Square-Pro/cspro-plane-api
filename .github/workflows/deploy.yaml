name: Django Deployment

on:
  pull_request:
    types: [closed]
    branches:
      - main 

jobs:
  deploy:
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for speed/security

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'  # Fixed to a stable version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary
          pip install -r requirements.txt

      - name: Run migrations (Optional)
        # Note: This runs on the GitHub Runner. Ensure secrets.DATABASE_URL or similar is set 
        # if your migrations need to talk to the DB during build.
        run: python manage.py migrate
        env:
          # You might need DB env vars here if migrate connects to the RDS/EC2 DB
          DEBUG: "False"

      - name: SSH into EC2 instance and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to project
            cd /home/ubuntu/PROJECT/cspro-plane-api
            
            # 2. Pull latest code
            git pull origin main
            
            # 3. Update virtual environment
            source /home/ubuntu/PROJECT/plane_env/bin/activate
            pip install -r requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput
            
            # 4. Restart Services
            # Note: Ensure this matches the service name we fixed earlier
            sudo systemctl restart plane_granthium
            sudo systemctl restart nginx