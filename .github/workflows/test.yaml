name: Run Unit Tests

on:
  push:
    branches:
      - feat/PLN-16-Renee-Banner-test-workflow
  pull_request:
    branches:
      - feat/PLN-16-Renee-Banner-test-workflow

jobs:
  test:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for speed/security

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'  # Fixed to a stable version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Unit Tests only
        run: pytest -v tests/test_utils.py